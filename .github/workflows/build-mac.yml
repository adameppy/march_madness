name: Build Mac App

on: [workflow_dispatch]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: |
            python3 -m venv venv
            source venv/bin/activate
            python3 -m pip install pyinstaller termcolor
            pyinstaller --onefile --windowed teampicker2026.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: march_madness_mac
          path: dist/
